# SonarQube Configuration for Dragonvite

sonar.projectKey=newcastle-engineering_dragonvite
sonar.projectName=Dragonvite
sonar.organization=newcastle-engineering
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Code paths
sonar.sources=apps,packages
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**,coverage/**,*.spec.ts,*.test.ts

# TypeScript specific
sonar.typescript.tsconfigPath=./tsconfig.json
sonar.typescript.lcov.reportPaths=apps/frontend/coverage/lcov.info,apps/backend/coverage/lcov.info,packages/shared/coverage/lcov.info

# Coverage
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/prisma/**,**/server.ts,**/socket/**,**/jobs/**,**/vitest.config.ts,**/vite.config.ts

# JavaScript/TypeScript linting
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Minimum code coverage (optional)
sonar.qualitygate.wait=true
